<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전데렐라의 청소생각</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }

        /* ✅ 전체를 하나의 컨테이너로 */
        .page-wrap {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        /* ✅ 이미지가 잘리지 않게 */
        .flyer-img,
        .brand-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* ✅ 이미지 사이 틈 제거 */
        .flyer-img {
            margin-bottom: 0;
        }

        .brand-img {
            margin-top: 0;
        }

        /* ✅ 버튼 영역 */
        .btn-wrap {
            width: 100%;
            padding: 10px 0 30px;
            background: #f5f0e8;
        }

        .btn-call {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 24px;
            background: #2E9E9E;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(46, 158, 158, 0.3);
        }

        .phone-icon {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: ring 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        .phone-icon svg {
            width: 22px;
            height: 22px;
            fill: #2E9E9E;
        }

        @keyframes ring {
            0%   { transform: rotate(0deg); }
            8%   { transform: rotate(18deg); }
            16%  { transform: rotate(-18deg); }
            24%  { transform: rotate(18deg); }
            32%  { transform: rotate(-18deg); }
            40%  { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        .call-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .call-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .call-number {
            font-size: 28px;
            color: white;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
        }

        /* ✅ 에어컨 바람 효과 */
        .flyer-container {
            position: relative;
            width: 100%;
        }

        .wind-wrap {
            position: absolute;
            top: 32%;
            left: 52%;
            width: 45%;
            height: 12%;
            pointer-events: none;
            overflow: hidden;
        }

        .wind-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
            border-radius: 2px;
            animation: wind-blow 1.8s ease-in-out infinite;
            opacity: 0;
        }

        .wind-line:nth-child(1) { top: 15%; width: 70%; animation-delay: 0s; }
        .wind-line:nth-child(2) { top: 35%; width: 90%; animation-delay: 0.3s; }
        .wind-line:nth-child(3) { top: 55%; width: 80%; animation-delay: 0.6s; }
        .wind-line:nth-child(4) { top: 75%; width: 60%; animation-delay: 0.9s; }

        @keyframes wind-blow {
            0%   { transform: translateX(-100%); opacity: 0; }
            20%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateX(150%); opacity: 0; }
        }

        /* ✅ 반짝이 효과 */
        .sparkle-wrap {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: sparkle-pop 2.5s ease-in-out infinite;
            opacity: 0;
        }

        .sparkle:nth-child(1)  { top: 5%;  left: 10%; animation-delay: 0s;    width: 5px;  height: 5px; }
        .sparkle:nth-child(2)  { top: 8%;  left: 80%; animation-delay: 0.4s;  width: 7px;  height: 7px; }
        .sparkle:nth-child(3)  { top: 15%; left: 50%; animation-delay: 0.8s;  width: 4px;  height: 4px; }
        .sparkle:nth-child(4)  { top: 3%;  left: 35%; animation-delay: 1.2s;  width: 6px;  height: 6px; }
        .sparkle:nth-child(5)  { top: 10%; left: 65%; animation-delay: 1.6s;  width: 5px;  height: 5px; }
        .sparkle:nth-child(6)  { top: 20%; left: 90%; animation-delay: 0.2s;  width: 4px;  height: 4px; }
        .sparkle:nth-child(7)  { top: 2%;  left: 55%; animation-delay: 2.0s;  width: 8px;  height: 8px; }

        @keyframes sparkle-pop {
            0%   { transform: scale(0) rotate(0deg);   opacity: 0; }
            30%  { transform: scale(1.4) rotate(90deg); opacity: 1; }
            60%  { transform: scale(1) rotate(180deg);  opacity: 0.8; }
            100% { transform: scale(0) rotate(270deg);  opacity: 0; }
        }

        /* ✅ shimmer 빛 스치는 효과 */
        .shimmer-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            border-radius: 0;
        }

        .shimmer-overlay::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(
                105deg,
                transparent 30%,
                rgba(255,255,255,0.15) 50%,
                transparent 70%
            );
            animation: shimmer-move 3.5s ease-in-out infinite;
        }

        @keyframes shimmer-move {
            0%   { left: -60%; }
            100% { left: 160%; }
        }
    </style>
</head>
<body>
    <div class="page-wrap">

        <!-- ✅ 전단지 + 효과 레이어 -->
        <div class="flyer-container">
            <img class="flyer-img" src="flyer.jpg" alt="에어컨 분해세척 전단지">

            <!-- 에어컨 바람 효과 -->
            <div class="wind-wrap">
                <div class="wind-line"></div>
                <div class="wind-line"></div>
                <div class="wind-line"></div>
                <div class="wind-line"></div>
            </div>

            <!-- 반짝이 효과 -->
            <div class="sparkle-wrap">
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
                <div class="sparkle"></div>
            </div>

            <!-- shimmer 빛 효과 -->
            <div class="shimmer-overlay"></div>
        </div>

        <!-- ✅ 브랜드 이미지 -->
        <img class="brand-img" src="brand.jpg" alt="전데렐라의 청소생각">

        <!-- ✅ 전화 버튼 -->
        <div class="btn-wrap">
            <a class="btn-call" href="tel:01087659925">
                <div class="phone-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2
                        1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17
                        0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
                    </svg>
                </div>
                <div class="call-text">
                    <span class="call-label">지금 바로 전화 주세요</span>
                    <span class="call-number">010-8765-9925</span>
                </div>
            </a>
        </div>

    </div>
</body>
</html>
