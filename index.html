<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전데렐라의 청소생각</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        }

        /* ✅ 이미지와 버튼을 하나의 컨테이너로 묶어 너비 통일 */
        .page-wrap {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        .flyer-img,
        .brand-img {
            width: 100%;
            display: block;
        }

        /* ✅ 버튼 영역 - 이미지와 동일한 너비, 간격 딱 붙이기 */
        .btn-wrap {
            width: 100%;
            padding: 12px 0 40px;
            background: #f5f0e8;
        }

        .btn-call {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            background: #2E9E9E;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(46, 158, 158, 0.3);
        }

        .phone-icon {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: ring 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        .phone-icon svg {
            width: 24px;
            height: 24px;
            fill: #2E9E9E;
        }

        @keyframes ring {
            0%   { transform: rotate(0deg); }
            8%   { transform: rotate(18deg); }
            16%  { transform: rotate(-18deg); }
            24%  { transform: rotate(18deg); }
            32%  { transform: rotate(-18deg); }
            40%  { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        .call-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .call-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .call-number {
            font-size: 32px;
            color: white;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
        }
    </style>
</head>
<body>

    <!-- ✅ 이미지 + 버튼을 하나의 박스로 묶음 -->
    <div class="page-wrap">
        <img class="flyer-img" src="flyer.jpg" alt="에어컨 분해세척 전단지">
        <img class="brand-img" src="brand.jpg" alt="전데렐라의 청소생각">

        <div class="btn-wrap">
            <a class="btn-call" href="tel:01087659925">
                <div class="phone-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 
                        1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 
                        0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
                    </svg>
                </div>
                <div class="call-text">
                    <span class="call-label">지금 바로 전화 주세요</span>
                    <span class="call-number">010-8765-9925</span>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
