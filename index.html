<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전데렐라의 청소생각</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f0e8; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
        .page-wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: stretch; overflow: hidden; }

        .flyer-container { position: relative; width: 100%; overflow: hidden; }
        .flyer-img, .brand-img { width: 100%; height: auto; display: block; }

        /* ====== 바람 효과 ====== */
        /* SVG로 진짜 부채꼴 퍼지는 바람선 구현 */
        .wind-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: visible;
        }
        .wind-svg line {
    stroke-linecap: round;
    stroke-opacity: 0;
    animation: wind-fan 3s ease-in-out infinite;
    }

        /* 10개 바람선 — 시작점(에어컨 54~90%), 끝점(30~110%) */
        /* stroke-dasharray로 길이 30% 제어 */
      .wind-svg line:nth-child(1)  { stroke: rgba(150,220,255,0.75); stroke-width: 0.4; animation-delay: 0.0s; }
.wind-svg line:nth-child(2)  { stroke: rgba(160,225,255,0.80); stroke-width: 0.5; animation-delay: 0.3s; }
.wind-svg line:nth-child(3)  { stroke: rgba(175,230,255,0.85); stroke-width: 0.6; animation-delay: 0.6s; }
.wind-svg line:nth-child(4)  { stroke: rgba(185,235,255,0.90); stroke-width: 0.7; animation-delay: 0.9s; }
.wind-svg line:nth-child(5)  { stroke: rgba(200,240,255,1.00); stroke-width: 0.8; animation-delay: 1.2s; }
.wind-svg line:nth-child(6)  { stroke: rgba(200,240,255,1.00); stroke-width: 0.8; animation-delay: 1.5s; }
.wind-svg line:nth-child(7)  { stroke: rgba(185,235,255,0.90); stroke-width: 0.7; animation-delay: 1.8s; }
.wind-svg line:nth-child(8)  { stroke: rgba(175,230,255,0.85); stroke-width: 0.6; animation-delay: 2.1s; }
.wind-svg line:nth-child(9)  { stroke: rgba(160,225,255,0.80); stroke-width: 0.5; animation-delay: 2.4s; }
.wind-svg line:nth-child(10) { stroke: rgba(150,220,255,0.75); stroke-width: 0.4; animation-delay: 2.7s; }



        @keyframes wind-fan {
    0%   { stroke-opacity: 0; }
    15%  { stroke-opacity: 0.9; }
    70%  { stroke-opacity: 0.7; }
    100% { stroke-opacity: 0; }
       }


        /* ====== 반짝임 (flash) ====== */
        .flash {
            position: absolute;
            width: 5px; height: 5px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            box-shadow:
                0 0 6px 4px rgba(255,255,255,0.95),
                0 0 16px 8px rgba(255,255,255,0.6),
                0 0 28px 14px rgba(255,255,255,0.25);
            animation: flash-burst 3.5s ease-in-out infinite;
        }
        /* 세로 0~8%, 가장자리 위주 배치 */
        .flash:nth-child(1)  { top: 2%;  left: 4%;  animation-delay: 0.0s; }
        .flash:nth-child(2)  { top: 5%;  left: 92%; animation-delay: 0.7s; }
        .flash:nth-child(3)  { top: 1%;  left: 20%; animation-delay: 1.4s; }
        .flash:nth-child(4)  { top: 6%;  left: 78%; animation-delay: 2.1s; }
        .flash:nth-child(5)  { top: 3%;  left: 50%; animation-delay: 0.4s; }
        .flash:nth-child(6)  { top: 7%;  left: 8%;  animation-delay: 1.1s; }
        .flash:nth-child(7)  { top: 4%;  left: 65%; animation-delay: 1.8s; }
        .flash:nth-child(8)  { top: 2%;  left: 85%; animation-delay: 2.5s; }
        .flash:nth-child(9)  { top: 6%;  left: 35%; animation-delay: 3.0s; }
        @keyframes flash-burst {
            0%   { transform: scale(0); opacity: 0; }
            8%   { transform: scale(2.0); opacity: 1; }
            20%  { transform: scale(1.3); opacity: 0.7; }
            35%  { transform: scale(0);   opacity: 0; }
            100% { transform: scale(0);   opacity: 0; }
        }

        /* ====== 물방울 ====== */
        .drop-wrap { position: absolute; pointer-events: none; }
        .drop-wrap:nth-of-type(1) { top: 50%; left: 58%; }
        .drop-wrap:nth-of-type(2) { top: 50%; left: 70%; }
        .drop-wrap:nth-of-type(3) { top: 50%; left: 82%; }
        .drop {
            position: absolute;
            width: 6px; height: 8px;
            background: radial-gradient(circle at 35%, rgba(255,255,255,0.9), rgba(150,220,255,0.7) 50%, rgba(100,190,255,0.4));
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            animation: drop-roll 3s ease-in infinite;
        }
        .drop-wrap:nth-of-type(1) .drop { animation-delay: 0.0s; }
        .drop-wrap:nth-of-type(2) .drop { animation-delay: 1.0s; }
        .drop-wrap:nth-of-type(3) .drop { animation-delay: 2.0s; }
        @keyframes drop-roll {
            0%   { transform: translate(0, 0);    opacity: 0; }
            10%  { opacity: 0.9; }
            65%  { transform: translate(3px, 28px); opacity: 0.8; }
            75%  { transform: translate(4px, 34px); opacity: 0; }
            100% { opacity: 0; }
        }
        .drop-burst {
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            border: 1.5px solid rgba(150,220,255,0.9);
            opacity: 0;
            box-shadow: 0 0 6px rgba(150,220,255,0.8), 0 0 12px rgba(255,255,255,0.5);
            animation: burst-expand 3s ease-out infinite;
        }
        .drop-wrap:nth-of-type(1) .drop-burst { animation-delay: 0.65s; }
        .drop-wrap:nth-of-type(2) .drop-burst { animation-delay: 1.65s; }
        .drop-wrap:nth-of-type(3) .drop-burst { animation-delay: 2.65s; }
        @keyframes burst-expand {
            0%   { transform: translate(4px, 34px) scale(0); opacity: 0; }
            64%  { opacity: 0; }
            65%  { transform: translate(4px, 34px) scale(0); opacity: 1; }
            85%  { transform: translate(4px, 34px) scale(4); opacity: 0.6; }
            100% { transform: translate(4px, 34px) scale(6); opacity: 0; }
        }

        /* ====== shimmer ====== */
        .shimmer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .shimmer-overlay::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.10) 50%, transparent 65%); animation: shimmer-move 5s ease-in-out infinite; }
        @keyframes shimmer-move { 0% { left: -60%; } 100% { left: 160%; } }

        /* ====== 전화 버튼 ====== */
        .btn-wrap { width: 100%; padding: 12px 0 24px; background: #f5f0e8; box-sizing: border-box; }


        .btn-call { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 16px 24px; background: #2E9E9E; border-radius: 0; text-decoration: none; box-shadow: 0 4px 15px rgba(46,158,158,0.3); }

        .phone-icon { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: ring 1.5s ease-in-out infinite; flex-shrink: 0; }
        .phone-icon svg { width: 22px; height: 22px; fill: #2E9E9E; }
        @keyframes ring { 0% { transform: rotate(0deg); } 8% { transform: rotate(18deg); } 16% { transform: rotate(-18deg); } 24% { transform: rotate(18deg); } 32% { transform: rotate(-18deg); } 40% { transform: rotate(0deg); } 100% { transform: rotate(0deg); } }
        .call-text { display: flex; flex-direction: column; align-items: flex-start; }
        .call-label { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 400; letter-spacing: 1px; margin-bottom: 3px; }
        .call-number { font-size: 28px; color: white; font-weight: 900; letter-spacing: 2px; line-height: 1; }

/* ✨ 판타지아 마법 파티클 */
.magic-wrap {
    position: absolute;
    top: 35%; left: 50%;
    width: 42%; height: 20%;
    pointer-events: none;
}
.magic-particle {
    position: absolute;
    width: 3px; height: 3px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    box-shadow:
        0 0 4px 2px rgba(255,255,255,0.9),
        0 0 10px 5px rgba(255,255,255,0.5),
        0 0 18px 8px rgba(255,255,255,0.2);
    animation: magic-fly 2.8s ease-out infinite;
}
.magic-particle:nth-child(1)  { top: 20%; left: 15%; animation-delay: 0.0s;  --tx: -18px; --ty: -22px; }
.magic-particle:nth-child(2)  { top: 30%; left: 40%; animation-delay: 0.3s;  --tx:  12px; --ty: -28px; }
.magic-particle:nth-child(3)  { top: 50%; left: 60%; animation-delay: 0.6s;  --tx:  22px; --ty: -15px; }
.magic-particle:nth-child(4)  { top: 60%; left: 25%; animation-delay: 0.9s;  --tx: -20px; --ty:  10px; }
.magic-particle:nth-child(5)  { top: 40%; left: 80%; animation-delay: 1.2s;  --tx:  16px; --ty:  20px; }
.magic-particle:nth-child(6)  { top: 15%; left: 55%; animation-delay: 1.5s;  --tx:  -8px; --ty: -30px; }
.magic-particle:nth-child(7)  { top: 70%; left: 70%; animation-delay: 1.8s;  --tx:  24px; --ty:  12px; }
.magic-particle:nth-child(8)  { top: 25%; left: 10%; animation-delay: 2.1s;  --tx: -24px; --ty: -10px; }
.magic-particle:nth-child(9)  { top: 55%; left: 45%; animation-delay: 2.4s;  --tx:   8px; --ty:  26px; }
.magic-particle:nth-child(10) { top: 10%; left: 30%; animation-delay: 2.7s;  --tx: -14px; --ty: -26px; }
@keyframes magic-fly {
    0%   { transform: translate(0, 0) scale(0);   opacity: 0; }
    15%  { transform: translate(calc(var(--tx) * 0.3), calc(var(--ty) * 0.3)) scale(1.5); opacity: 1; }
    50%  { transform: translate(calc(var(--tx) * 0.7), calc(var(--ty) * 0.7)) scale(1.0); opacity: 0.8; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

/* 💧 brand.jpg 물방울 튀김 효과 */
.brand-container {
    position: relative;
    width: 100%;
}
.splash-wrap {
    position: absolute;
    top: 52%; left: 68%;
    width: 15%; height: 18%;
    pointer-events: none;
}

.splash-drop {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(150, 220, 255, 0.9);
    border-radius: 50%;
    opacity: 0;
    box-shadow:
        0 0 4px 2px rgba(255,255,255,0.8),
        0 0 8px 4px rgba(150,220,255,0.5);
    animation: splash-out 3.5s ease-out infinite;
}
.splash-drop:nth-child(1)  { animation-delay: 0.0s;  --sx:  0px;  --sy: -22px; }
.splash-drop:nth-child(2)  { animation-delay: 0.08s; --sx:  14px; --sy: -18px; }
.splash-drop:nth-child(3)  { animation-delay: 0.16s; --sx:  22px; --sy:  -6px; }
.splash-drop:nth-child(4)  { animation-delay: 0.24s; --sx:  20px; --sy:  12px; }
.splash-drop:nth-child(5)  { animation-delay: 0.32s; --sx:   8px; --sy:  22px; }
.splash-drop:nth-child(6)  { animation-delay: 0.40s; --sx: -10px; --sy:  20px; }
.splash-drop:nth-child(7)  { animation-delay: 0.48s; --sx: -22px; --sy:   8px; }
.splash-drop:nth-child(8)  { animation-delay: 0.56s; --sx: -20px; --sy: -12px; }
.splash-drop:nth-child(9)  { animation-delay: 0.64s; --sx:  -8px; --sy: -20px; }
.splash-drop:nth-child(10) { animation-delay: 0.72s; --sx:  18px; --sy: -14px; }
.splash-drop:nth-child(11) { animation-delay: 0.80s; --sx: -16px; --sy:  16px; }
.splash-drop:nth-child(12) { animation-delay: 0.88s; --sx:  10px; --sy:  18px; }
@keyframes splash-out {
    0%   { transform: translate(0, 0) scale(0); opacity: 0; }
    8%   { transform: translate(calc(var(--sx)*0.2), calc(var(--sy)*0.2)) scale(1.2); opacity: 1; }
    40%  { transform: translate(calc(var(--sx)*0.8), calc(var(--sy)*0.8)) scale(0.8); opacity: 0.7; }
    70%  { transform: translate(var(--sx), var(--sy)) scale(0.4); opacity: 0.3; }
    100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
}
/* 중심 파동 */
.splash-ripple {
    position: absolute;
    top: 50%; left: 50%;
    width: 8px; height: 8px;
    margin: -4px 0 0 -4px;
    border-radius: 50%;
    border: 1.5px solid rgba(150, 220, 255, 0.8);
    opacity: 0;
    animation: ripple-expand 3.5s ease-out infinite;
}
.splash-ripple:nth-child(13) { animation-delay: 0.0s; }
.splash-ripple:nth-child(14) { animation-delay: 0.3s; }
@keyframes ripple-expand {
    0%   { transform: scale(0); opacity: 0; }
    5%   { opacity: 1; }
    60%  { transform: scale(5); opacity: 0.4; }
    100% { transform: scale(7); opacity: 0; }
}

.splash-wrap2 {
    position: absolute;
    top: 20%; left: 83%;
    width: 12%; height: 15%;
    pointer-events: none;
}

.splash-wrap2 .splash-drop {
    animation: splash-out 3.5s ease-out infinite;
}
.splash-wrap2 .splash-drop:nth-child(1)  { animation-delay: 0.1s; }
.splash-wrap2 .splash-drop:nth-child(2)  { animation-delay: 0.3s; }
.splash-wrap2 .splash-drop:nth-child(3)  { animation-delay: 0.5s; }
.splash-wrap2 .splash-drop:nth-child(4)  { animation-delay: 0.7s; }
.splash-wrap2 .splash-drop:nth-child(5)  { animation-delay: 0.9s; }
.splash-wrap2 .splash-drop:nth-child(6)  { animation-delay: 1.1s; }
.splash-wrap2 .splash-drop:nth-child(7)  { animation-delay: 1.3s; }
.splash-wrap2 .splash-drop:nth-child(8)  { animation-delay: 1.5s; }
.splash-wrap2 .splash-drop:nth-child(9)  { animation-delay: 1.7s; }
.splash-wrap2 .splash-drop:nth-child(10) { animation-delay: 1.9s; }
.splash-wrap2 .splash-drop:nth-child(11) { animation-delay: 2.1s; }
.splash-wrap2 .splash-drop:nth-child(12) { animation-delay: 2.3s; }
.splash-wrap2 .splash-ripple { animation: ripple-expand 3.5s ease-out infinite; }
.splash-wrap2 .splash-ripple:nth-child(13) { animation-delay: 0.1s; }
.splash-wrap2 .splash-ripple:nth-child(14) { animation-delay: 0.4s; }

.splash-wrap3 {
    position: absolute;
    top: 75%; left: 48%;
    width: 15%; height: 18%;
    pointer-events: none;
}

.splash-wrap3 .splash-drop {
    animation: splash-out 3.5s ease-out infinite;
}
.splash-wrap3 .splash-drop:nth-child(1)  { animation-delay: 0.2s; }
.splash-wrap3 .splash-drop:nth-child(2)  { animation-delay: 0.4s; }
.splash-wrap3 .splash-drop:nth-child(3)  { animation-delay: 0.6s; }
.splash-wrap3 .splash-drop:nth-child(4)  { animation-delay: 0.8s; }
.splash-wrap3 .splash-drop:nth-child(5)  { animation-delay: 1.0s; }
.splash-wrap3 .splash-drop:nth-child(6)  { animation-delay: 1.2s; }
.splash-wrap3 .splash-drop:nth-child(7)  { animation-delay: 1.4s; }
.splash-wrap3 .splash-drop:nth-child(8)  { animation-delay: 1.6s; }
.splash-wrap3 .splash-drop:nth-child(9)  { animation-delay: 1.8s; }
.splash-wrap3 .splash-drop:nth-child(10) { animation-delay: 2.0s; }
.splash-wrap3 .splash-drop:nth-child(11) { animation-delay: 2.2s; }
.splash-wrap3 .splash-drop:nth-child(12) { animation-delay: 2.4s; }
.splash-wrap3 .splash-ripple { animation: ripple-expand 3.5s ease-out infinite; }
.splash-wrap3 .splash-ripple:nth-child(13) { animation-delay: 0.2s; }
.splash-wrap3 .splash-ripple:nth-child(14) { animation-delay: 0.5s; }



.splash-drop {

    border-radius: 50%;

}
.splash-drop:nth-child(1)  { animation-delay: 0.0s; --sx: -18px; --sy: -20px; }
.splash-drop:nth-child(.btn-wrap2)  { animation-delay: 0.3s; --sx:  16px; --sy: -22px; }
.splash-drop:nth-child(3)  { animation-delay: 0.6s; --sx: -22px; --sy:  -8px; }
.splash-drop:nth-child(4)  { animation-delay: 0.9s; --sx:  20px; --sy:  -6px; }
.splash-drop:nth-child(5)  { animation-delay: 1.2s; --sx: -12px; --sy: -26px; }
.splash-drop:nth-child(6)  { animation-delay: 1.5s; --sx:  14px; --sy: -18px; }
.splash-drop:nth-child(7)  { animation-delay: 1.8s; --sx: -20px; --sy:  10px; }
.splash-drop:nth-child(8)  { animation-delay: 2.1s; --sx:  18px; --sy:  12px; }
.splash-drop:nth-child(9)  { animation-delay: 2.4s; --sx:  -8px; --sy:  22px; }
.splash-drop:nth-child(10) { animation-delay: 2.7s; --sx:  10px; --sy:  20px; }
.splash-drop:nth-child(11) { animation-delay: 3.0s; --sx: -16px; --sy:  16px; }
.splash-drop:nth-child(12) { animation-delay: 3.3s; --sx:  12px; --sy:  24px; }
@keyframes splash-out {
    0%   { transform: translate(0,0) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    60%  { transform: translate(var(--sx), var(--sy)) scale(1); opacity: 0.7; }

}

}

    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="flyer-container">
            <img class="flyer-img" src="flyer.jpg" alt="에어컨 분해세척 전단지">

            <!-- 바람 SVG — 시작점(에어컨 54~90%), 끝점(30~110%), 세로 50%→65% -->
            <!-- flyer 실제 비율: 480×860 기준 퍼센트 사용 -->
            <svg class="wind-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <!-- x1=시작가로%, y1=50%, x2=끝가로%, y2=65% -->
                <!-- stroke-dasharray = 선길이의 30%만 표시 -->
                <line x1="54" y1="50" x2="30" y2="57"/>
                <line x1="58" y1="50" x2="36" y2="57"/>
                <line x1="63" y1="50" x2="44" y2="57"/>
                <line x1="68" y1="50" x2="54" y2="57"/>
                <line x1="72" y1="50" x2="64" y2="57"/>
                <line x1="77" y1="50" x2="77" y2="57"/>
                <line x1="81" y1="50" x2="87" y2="57"/>
                <line x1="85" y1="50" x2="94" y2="57"/>
                <line x1="88" y1="50" x2="100" y2="57"/>
                <line x1="90" y1="50" x2="107" y2="57"/>

            </svg>

            <!-- 반짝임 -->
            <div class="flash"></div>
            <div class="flash"></div>
            <div class="flash"></div>
            <div class="flash"></div>
            <div class="flash"></div>
            <div class="flash"></div>
            <div class="flash"></div>
            <div class="flash"></div>
            <div class="flash"></div>

            <!-- 물방울 -->
            <div class="drop-wrap"><div class="drop"></div><div class="drop-burst"></div></div>
            <div class="drop-wrap"><div class="drop"></div><div class="drop-burst"></div></div>
            <div class="drop-wrap"><div class="drop"></div><div class="drop-burst"></div></div>

            <div class="magic-wrap">
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
               <div class="magic-particle"></div>
           </div>

            <div class="shimmer-overlay"></div>
        </div>
                <div class="brand-container">
            <img class="brand-img" src="brand.jpg" alt="전데렐라의 청소생각">
            <div class="splash-wrap">
