<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전데렐라의 청소생각</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #003366; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }
        .flyer-img { 
            width: 100%; 
            max-width: 600px; 
            display: block; 
        }
        .btn-wrap { 
            width: 100%; 
            max-width: 600px; 
            padding: 16px 16px 30px 16px; 
            background: #003366; 
        }
        .btn-call {
            display: block;
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #FF4444, #cc0000);
            color: white;
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            border-radius: 14px;
            text-decoration: none;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(255,68,68,0.5);
        }
        .btn-call .label {
            font-size: 16px;
            display: block;
            margin-bottom: 6px;
            opacity: 0.9;
        }
        .btn-call .number {
            font-size: 28px;
            display: block;
            color: #FFE500;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <img class="flyer-img" src="flyer.jpg" alt="에어컨 분해세척 전단지">
    <div class="btn-wrap">
        <a class="btn-call" href="tel:01087659925">
            <span class="label">📞 편안하게 상담하세요!</span>
            <span class="number">010-8765-9925</span>
        </a>
    </div>
</body>
</html>
